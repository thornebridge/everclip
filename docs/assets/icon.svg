<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="clip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#cbd5e1"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>
  <!-- Clipboard body -->
  <rect x="140" y="150" width="232" height="260" rx="20" fill="url(#clip)" opacity="0.15"/>
  <rect x="140" y="150" width="232" height="260" rx="20" fill="none" stroke="url(#clip)" stroke-width="4" opacity="0.4"/>
  <!-- Clipboard clip top -->
  <rect x="200" y="126" width="112" height="48" rx="12" fill="url(#clip)" opacity="0.3"/>
  <rect x="220" y="116" width="72" height="32" rx="10" fill="url(#accent)"/>
  <!-- Horizontal lines (clipboard content) -->
  <rect x="176" y="200" width="120" height="8" rx="4" fill="url(#clip)" opacity="0.2"/>
  <rect x="176" y="224" width="160" height="8" rx="4" fill="url(#clip)" opacity="0.15"/>
  <rect x="176" y="248" width="90" height="8" rx="4" fill="url(#clip)" opacity="0.12"/>
  <!-- Infinity / loop symbol (the "ever" in EverClip) -->
  <g transform="translate(256, 340)" fill="none" stroke="url(#glow)" stroke-width="7" stroke-linecap="round">
    <path d="M-40,0 C-40,-22 -22,-22 0,-0 C22,22 40,22 40,0 C40,-22 22,-22 0,0 C-22,22 -40,22 -40,0 Z" opacity="0.9"/>
  </g>
  <!-- Accent dots (representing multiple clipboard types) -->
  <circle cx="176" cy="296" r="6" fill="#6366f1" opacity="0.7"/>
  <circle cx="196" cy="296" r="6" fill="#10b981" opacity="0.7"/>
  <circle cx="216" cy="296" r="6" fill="#f59e0b" opacity="0.7"/>
  <circle cx="236" cy="296" r="6" fill="#8b5cf6" opacity="0.7"/>
</svg>
